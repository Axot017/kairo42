services:
  postgres:
    image: docker.io/postgres:18.4
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: kairo42
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
